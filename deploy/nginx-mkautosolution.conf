# Nginx virtual host — mkautosolution.cloud
# Copie para /etc/nginx/sites-available/mkautosolution.cloud
# e crie o symlink em sites-enabled/

server {
    listen 80;
    listen [::]:80;
    server_name mkautosolution.cloud www.mkautosolution.cloud;

    root /var/www/mkautosolution.cloud;
    index index.html;

    # ── Segurança ─────────────────────────────
    add_header X-Content-Type-Options    "nosniff"                          always;
    add_header X-Frame-Options           "SAMEORIGIN"                       always;
    add_header X-XSS-Protection          "1; mode=block"                    always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"  always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;

    # ── Compressão ────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/html
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;

    # ── Cache para assets estáticos ───────────
    location ~* \.(css|js|jpg|jpeg|png|webp|ico|svg|woff|woff2|ttf)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Roteamento principal ──────────────────
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # ── Bloquear arquivos ocultos ─────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ── Bloquear acesso à pasta deploy ────────
    location /deploy/ {
        deny all;
    }
}

# Nota: após rodar certbot, este arquivo será modificado
# automaticamente para incluir o bloco SSL (porta 443)
# e o redirect http → https.
